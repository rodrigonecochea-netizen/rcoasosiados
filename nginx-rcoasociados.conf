server {
    listen 80;
    listen [::]:80;
    server_name rcoasociados.com www.rcoasociados.com;

    root /var/www/rcoasociados;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /living {
        return 301 /living/;
    }

    location /living/ {
        try_files $uri $uri/ /living/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|jpg|jpeg|png|webp|svg|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
